<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>KYSE GM 登录</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark-1: #0f172a;
            --bg-dark-2: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #0f172a;
            --text-sub: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --danger: #dc2626;
        }
        body {
            background: radial-gradient(circle at 20% 20%, #1e3a8a 0%, var(--bg-dark-2) 35%, var(--bg-dark-1) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 16px;
        }
        .gm-login-card {
            background: var(--card-bg);
            backdrop-filter: blur(6px);
            border-radius: 14px;
            padding: 30px 32px;
            width: 380px;
            max-width: 96vw;
            border: 1px solid rgba(255,255,255,0.55);
            box-shadow: 0 20px 50px rgba(15,23,42,0.5);
        }
        .gm-login-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: var(--text-main); }
        .gm-login-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 18px; }
        .form-label { font-size: 13px; color: #334155; font-weight: 600; }
        .form-control {
            font-size: 14px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            padding: 9px 11px;
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            border-radius: 10px;
            padding: 9px 12px;
            font-weight: 600;
            box-shadow: 0 6px 14px rgba(37,99,235,0.22);
        }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .gm-login-footer { margin-top: 12px; font-size: 12px; color: #94a3b8; display: flex; justify-content: space-between; align-items: center; }
        .gm-error { margin-top: 8px; font-size: 12px; color: var(--danger); display: none; }
    </style>
</head>
<body>
    <div class="gm-login-card">
        <div class="mb-2">
            <div class="gm-login-title">GM 管理登录</div>
            <div class="gm-login-sub">请输入 GM 账号和密码；</div>
        </div>
        <div class="mb-3">
            <label for="gmLoginUser" class="form-label">账号</label>
            <input type="text" id="gmLoginUser" class="form-control" placeholder="" autocomplete="username">
        </div>
        <div class="mb-2">
            <label for="gmLoginPass" class="form-label">密码</label>
            <input type="password" id="gmLoginPass" class="form-control" placeholder="" autocomplete="current-password">
        </div>
        <div id="gmLoginError" class="gm-error"></div>
        <div class="d-grid gap-2 mt-3">
            <button type="button" id="gmLoginBtn" class="btn btn-primary btn-sm">登录并进入 GM 后台</button>
        </div>
        <div class="gm-login-footer">
            <span>登录成功后会自动跳转到 GM 后台。</span>
        </div>
    </div>

    <script>
        const API = window.location.origin || 'http://127.0.0.1:8080';

        async function gmLoginSubmit() {
            const userEl = document.getElementById('gmLoginUser');
            const passEl = document.getElementById('gmLoginPass');
            const errEl = document.getElementById('gmLoginError');
            const btn = document.getElementById('gmLoginBtn');
            const u = (userEl.value || '').trim();
            const p = (passEl.value || '').trim();
            if (!u || !p) {
                errEl.textContent = '请输入账号和密码。';
                errEl.style.display = 'block';
                return;
            }
            errEl.style.display = 'none';
            btn.disabled = true;
            try {
                const res = await fetch(API + '/gm/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (!data.success) {
                    errEl.textContent = data.message || '登录失败，请重试。';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    return;
                }
                // 后端已设置 gm_token Cookie；如有需要也可以把 token 暂存
                if (data.token) {
                    sessionStorage.setItem('gmToken', data.token);
                }
                window.location.href = '/kyse.html';
            } catch (e) {
                errEl.textContent = '登录失败：' + (e.message || e.toString());
                errEl.style.display = 'block';
                btn.disabled = false;
            }
        }

        document.getElementById('gmLoginBtn').onclick = gmLoginSubmit;
        document.getElementById('gmLoginPass').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') gmLoginSubmit();
        });
    </script>
</body>
</html>
